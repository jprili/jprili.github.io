<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>James Paolo Rili | Home</title>
        <!-- Font -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap"
            rel="stylesheet"
        />

        <!-- Other CSS -->
        <link rel="stylesheet" href="styles/style.css" />

        <!-- Scripts -->
        <script src="load.js" defer></script>
    </head>
    <body class="bg-1 fg-1">
        <main class="max-w-screen-lg bg-2 mx-auto rounded-md py-4">
            <div class="flex flex-col text-center my-2">
                <h1 class="text-3xl lora-600 font-bold">James Paolo Rili</h1>
                <h2 class="text-xl lora-400">Physics + Computer Systems</h2>
                <div class="flex flex-row justify-center mx-auto gap-4 my-2">
                    <img src="res/icons/Octicons-mark-github.svg" alt="" srcset="">
                    <img src="res/icons/linkedin.svg" alt="">
                </div>
            </div>

            <div id="work-experience" class="px-4">
                <h1 class="text-2xl font-bold lora-400">Work Experience</h1>
                <hr />
                <div id="work-experience-carousel"></div>
            </div>

            <div id="skills" class="px-4 lora">
                <h1 class="text-2xl font-bold lora-400">Skills</h1>
                <hr />
                <div id="skills-carousel">
                    <div class="tabs">
                        <ul
                            class="flex flex-wrap md:flex-row justify-around my-2"
                        >
                            <li class="tab-item" id="software">Software</li>
                            <li class="tab-item" id="hardware">Hardware</li>
                            <li class="tab-item" id="documentation">
                                Documentation
                            </li>
                            <li class="tab-item" id="other">Soft Skills</li>
                        </ul>
                    </div>
                    <div id="skill-content"></div>
                </div>
            </div>

            <div id="education" class="px-4">
                <h1 class="text-2xl font-bold lora-400">Education</h1>
                <hr />
                <div id="education-carousel"></div>
            </div>

            <div id="projects" class="px-4">
                <h1 class="text-2xl font-bold lora-400">Projects</h1>
                <hr />
                <div id="projects-carousel">
                    <p>Coming Soon</p>
                </div>
            </div>
        </main>
        <template id="general-card-template">
            <div class="card lora py-2">
                <div class="flex flex-col md:flex-row justify-between">
                    <h2 class="text-md font-bold title"></h2>
                    <h2 class="text-sm date"></h2>
                </div>
                <div class="flex flex-col md:flex-row justify-between">
                    <h2 class="text-md institution"></h2>
                    <h2 class="text-sm location"></h2>
                </div>
                <div class="description px-4"></div>
            </div>
        </template>

        <template id="skills-card-template">
            <div class="card">
                <h1 class="text-xl title"></h1>
                <h2 class="date"></h2>
                <div></div>
            </div>
        </template>
    </body>
</html>
