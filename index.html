<!DOCTYPE html>

<html>
  <head>
    <title>James Paolo Rili -- PseudoVim</title>
    <link rel="stylesheet" href="css/styles.css">

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  </head>

  <body>
    <main id="main">
      <div id="text">
        Welcome to James Paolo Rili's website. <br>
        to start, you can either click or type
        the following: <br>
        <br>
        <div class="commandGroup">
          <span class="command"><a href="#">:index</a></span> 
          <span class="commandDesc">to go back to this page.</span><br>
        </div>
        <div class="commandGroup">
          <span class="command"><a href="#projects">:projects</a></span> 
          <span class="commandDesc">for a list of projects.</span><br>
        </div>
        <div class="commandGroup">
          <span class="command"><a href="#contacts">:contacts</a></span> 
          <span class="commandDesc">to view my contact information. </span><br>
        </div>
      </div>
    </main>
  
    <header>
      <div id="statBar">
        <div id="statBar-mode">[NORMAL]</div>
        <div id="statBar-info">index [+] (%d%)</div>
      </div>
    </header>

  <div id="commandDiv">
    <form id="commandForm">
      <input type="text" id="commandInput" placeholder="">
    </form>
  </div>

    <footer>
      By James, with some help from GPT-3
    </footer>

    <script src="js/main.js" type="module"></script>
  </body>
</html>
