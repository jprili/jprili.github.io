      github: https://github.com/jprili/gnn-mlip
  - project:
      key: semiconductor
      name: Characterisation of Semiconducting Materials
      desc: Analysis of a thin semiconducting sheet (GaAs) using
        the Van der Pauw method and Hall Effect to provide
